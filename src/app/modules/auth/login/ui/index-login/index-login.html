<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">
  <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6 text-gray-900 dark:text-white">
      {{ 'AUTH.LOGIN.TITLE' | translate }}
    </h1>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          {{ 'AUTH.LOGIN.EMAIL' | translate }}
        </label>
        <input
          pInputText
          type="email"
          id="email"
          [invalid]="loginForm.get('email') | controlHasInvalid"
          formControlName="email"
          class="w-full"
          [placeholder]="'AUTH.LOGIN.EMAIL' | translate"
        />
        <validator-errors
          [control]="loginForm.get('email')"
          [label]="'AUTH.LOGIN.EMAIL' | translate"
        />
      </div>

      <!-- Password Field -->
      <div class="mb-6">
        <label
          for="password"
          class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
        >
          {{ 'AUTH.LOGIN.PASSWORD' | translate }}
        </label>
        <p-password
          id="password"
          formControlName="password"
          [invalid]="loginForm.get('password') | controlHasInvalid"
          [feedback]="false"
          [toggleMask]="true"
          [placeholder]="'AUTH.LOGIN.PASSWORD' | translate"
        />
        <validator-errors
          [control]="loginForm.get('password')"
          [label]="'AUTH.LOGIN.PASSWORD' | translate"
        />
      </div>

      <!-- Submit Button -->
      <p-button
        type="submit"
        [loading]="isLoading()"
        [label]="'AUTH.LOGIN.SUBMIT' | translate"
        styleClass="w-full"
        [disabled]="isLoading()"
      />
    </form>

    <!-- Change Password Link -->
    <div class="mt-4 text-center">
      <a
        routerLink="/auth/password-change"
        class="text-sm text-primary-600 hover:text-primary-700 dark:text-primary-400"
      >
        {{ 'AUTH.CHANGE_PASSWORD' | translate }}
      </a>
    </div>
  </div>
</div>
