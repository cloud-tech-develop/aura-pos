<form [formGroup]="brandForm" class="flex flex-col gap-4">
  <div class="flex flex-col gap-2">
    <label for="name" class="font-bold text-surface-700 text-xs">
      {{ 'BRANDS.NAME' | translate }} <span class="text-red-500">*</span>
    </label>
    <input
      pInputText
      id="name"
      formControlName="name"
      placeholder="Ej: Samsung, Apple, Sony..."
      class="w-full"
    />
    <validator-errors [control]="brandForm.get('name')" [label]="'TABLE.NAME' | translate" />
  </div>

  <div
    class="border border-surface-200 rounded-xl p-4 flex justify-between items-center bg-surface-50/30"
  >
    <div class="flex flex-col">
      <span class="font-bold text-surface-800 text-sm">{{ 'TABLE.STATUS' | translate }}</span>
      <span class="text-xs text-surface-500">
        {{
          brandForm.get('active')?.value
            ? ('MESSAGES.CATEGORY_ACTIVE' | translate)
            : ('MESSAGES.CATEGORY_INACTIVE' | translate)
        }}
      </span>
    </div>
    <p-toggleswitch formControlName="active" class="p-green-500"></p-toggleswitch>
  </div>

  <div class="flex justify-end gap-2 pt-2">
    <button pButton [label]="'GLOBAL.ACTIONS.CANCEL' | translate" class="p-button-text" (click)="cancel()"></button>
    <button
      pButton
      [label]="isEditing() ? ('GLOBAL.ACTIONS.UPDATE' | translate) : ('GLOBAL.ACTIONS.ADD' | translate)"
      [loading]="isSaving()"
      (click)="saveBrand()"
    ></button>
  </div>
</form>
