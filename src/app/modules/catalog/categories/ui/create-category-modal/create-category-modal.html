<form [formGroup]="categoryForm" class="flex flex-col gap-4">
  <div class="flex flex-col gap-2">
    <label for="name" class="font-bold text-surface-700 text-xs">
      Nombre <span class="text-red-500">*</span>
    </label>
    <input
      pInputText
      id="name"
      formControlName="name"
      placeholder="Ej: Bebidas, Electrónica,..."
      class="w-full"
    />
    <validator-errors [control]="categoryForm.get('name')" [label]="'HEADERS.NAME' | translate" />
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div class="flex flex-col gap-2">
      <label for="default_tax_rate" class="font-bold text-surface-700 text-xs">
        Tasa de impuesto (%)
      </label>
      <p-inputNumber
        id="default_tax_rate"
        formControlName="default_tax_rate"
        [min]="0"
        [max]="100"
        [minFractionDigits]="0"
        [maxFractionDigits]="2"
        placeholder="0"
        class="w-full"
      ></p-inputNumber>
      <validator-errors
        [control]="categoryForm.get('default_tax_rate')"
        [label]="'CATEGORIES.TAX_RATE' | translate"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label for="parent_id" class="font-bold text-surface-700 text-xs"> Categoría padre </label>
      <p-select
        id="parent_id"
        formControlName="parent_id"
        [options]="categoryList()"
        placeholder="Sin categoría padre"
        optionLabel="name"
        optionValue="id"
        class="w-full"
        [showClear]="true"
      ></p-select>
    </div>
  </div>

  <div
    class="border border-surface-200 rounded-xl p-4 flex justify-between items-center bg-surface-50/30"
  >
    <div class="flex flex-col">
      <span class="font-bold text-surface-800 text-sm">Activo</span>
      <span class="text-xs text-surface-500">
        {{
          categoryForm.get('active')?.value
            ? 'La categoría estará visible'
            : 'La categoría estará oculta'
        }}
      </span>
    </div>
    <p-toggleswitch formControlName="active" class="p-green-500"></p-toggleswitch>
  </div>

  <div class="flex flex-col gap-2">
    <label for="description" class="font-bold text-surface-700 text-xs">
      Descripción <span class="text-surface-400 font-normal">(opcional)</span>
    </label>
    <textarea
      pTextarea
      id="description"
      formControlName="description"
      rows="3"
      placeholder="Descripción de la categoría..."
      class="w-full resize-y"
    ></textarea>
    <validator-errors
      [control]="categoryForm.get('description')"
      [label]="'HEADERS.DESCRIPTION' | translate"
    />
  </div>

  <div class="flex justify-end gap-2 pt-2">
    <button pButton label="Cancelar" class="p-button-text" (click)="cancel()"></button>
    <button
      pButton
      [label]="isEditing() ? 'Actualizar' : 'Crear'"
      [loading]="isSaving()"
      (click)="saveCategory()"
    ></button>
  </div>
</form>
