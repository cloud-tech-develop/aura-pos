<header class="header">
  <nav class="header-nav">
    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="isActive(tab.route)"
      (click)="navigate(tab.route)"
    >
      {{ tab.label }}
    </button>
  </nav>
  
  <!-- Search -->
  <div class="header-search">
    <svg xmlns="http://www.w3.org/2000/svg" class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input 
      type="text" 
      placeholder="Buscar..." 
      class="search-input"
    />
  </div>
  
  <!-- User Profile with Dropdown -->
  <div class="header-user">
    <button class="user-btn" (click)="toggleUserDropdown()">
      <img 
        src="https://ui-avatars.com/api/?name=Test+User&background=random&color=fff" 
        alt="User" 
        class="user-avatar"
      />
    </button>
    
    <!-- User Dropdown with Theme Panel -->
    <div 
      class="user-dropdown" 
      *ngIf="isUserDropdownOpen()"
      (click)="$event.stopPropagation()"
    >
      <app-theme-panel></app-theme-panel>
    </div>
  </div>
</header>
