<div class="theme-panel">
  <!-- User Profile Section -->
  <div class="user-section">
    <div class="user-avatar">
      <img src="https://ui-avatars.com/api/?name=Test+User&background=random&color=fff" alt="User" />
    </div>
    <div class="user-info">
      <h4 class="user-name">Test User</h4>
      <span class="user-role">SUPER_ADMIN</span>
    </div>
  </div>
  
  <!-- Menu Items -->
  <div class="menu-section">
    <button class="menu-item">
      <svg xmlns="http://www.w3.org/2000/svg" class="menu-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      <span>Your Profile</span>
    </button>
    
    <button class="menu-item">
      <svg xmlns="http://www.w3.org/2000/svg" class="menu-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span>Settings</span>
    </button>
    
    <button class="menu-item logout">
      <svg xmlns="http://www.w3.org/2000/svg" class="menu-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      <span>Log out</span>
    </button>
  </div>
  
  <!-- Divider -->
  <div class="divider"></div>
  
  <!-- Color Section -->
  <div class="section">
    <h5 class="section-title">Color</h5>
    <div class="color-grid">
      <button
        *ngFor="let palette of palettes"
        class="color-btn"
        [class.active]="currentPalette() === palette.id"
        [style.--color]="palette.color"
        (click)="onPaletteChange(palette.id)"
      >
        <span class="color-dot" [style.background-color]="palette.color"></span>
        <span class="color-name">{{ palette.name }}</span>
      </button>
    </div>
  </div>
  
  <!-- Mode Section -->
  <div class="section">
    <h5 class="section-title">Mode</h5>
    <div class="mode-toggle">
      <button
        class="mode-btn"
        [class.active]="currentMode() === 'light'"
        (click)="onModeChange('light')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="mode-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span>Light</span>
      </button>
      
      <button
        class="mode-btn"
        [class.active]="currentMode() === 'dark'"
        (click)="onModeChange('dark')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="mode-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <span>Dark</span>
      </button>
    </div>
  </div>
</div>
